:root{

--panel:#1b1330;
--soft:#231842;
--text:#f3f0ff;
--muted:#b8aee0;
--primary:#8b5cf6;

body{

.hero{

background:var(--primary);
border:none;
cursor:pointer;
color:white;
box-shadow:0 0 15px rgba(168,85,247,.4);

}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 0 25px rgba(168,85,247,.6);
}

.panel{
max-width:900px;
margin:50px auto;
background:var(--panel);
border:1px solid var(--border);
padding:30px;
border-radius:18px;

.card{
background:var(--soft);
border-left:4px solid var(--danger);
